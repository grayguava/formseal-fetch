name: 💬 Question / Support
description: Need help with setup, usage, or something that isn't a bug
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Happy to help! Please check the [docs](https://github.com/grayguava/formseal-fetch/tree/main/docs) and [troubleshooting guide](https://github.com/grayguava/formseal-fetch/blob/main/docs/troubleshooting.md) first — your answer may already be there.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before submitting
      options:
        - label: I read the relevant docs and didn't find an answer
          required: true
        - label: I searched existing issues
          required: true

  - type: dropdown
    id: topic
    attributes:
      label: What is your question about?
      options:
        - Installation
        - Setup / connect command
        - Fetch command / output
        - Provider configuration (Cloudflare KV)
        - Provider configuration (Supabase)
        - Something else
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: Be as specific as you can. What are you trying to do, and what's blocking you?
      placeholder: I'm trying to... but I'm not sure how to...
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What have you already tried?
      placeholder: I ran `fsf connect provider:cloudflare` and also checked...
    validations:
      required: false

  - type: input
    id: fsf_version
    attributes:
      label: formseal-fetch version
      description: Run `fsf` with no arguments and paste the version shown in the header.
      placeholder: e.g. v2.2.0
    validations:
      required: true

  - type: input
    id: install_method
    attributes:
      label: How did you install formseal-fetch?
      placeholder: e.g. pipx install formseal-fetch
    validations:
      required: false