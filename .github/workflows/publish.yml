name: Publish to PyPI

on:
  workflow_run:
    workflows: [Inject Version]
    types: [completed]
    branches: [main]

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Read version
        id: version
        run: |
          VERSION=$(cat version.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "::notice::Publishing version $VERSION to PyPI"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build
        run: |
          echo "::group::Installing build dependencies"
          pip install build
          echo "::endgroup::"
          echo "::group::Building package"
          python -m build
          echo "::endgroup::"
          echo "::notice::Build complete for v${{ steps.version.outputs.version }}"

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1