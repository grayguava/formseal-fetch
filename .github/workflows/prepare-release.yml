name: Prepare Release

on:
  workflow_run:
    workflows: [Inject Version]
    types: [completed]
    branches: [main]

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(cat version.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check tag exists
        id: tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        if: ${{ !steps.tag.outputs.exists }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create or update release
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v$VERSION"
          BODY=$(cat <<EOF
          ## What's Changed
          - Updated to v$VERSION
          EOF
          )
          # Check if release exists
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "Release $TAG" --notes "$BODY"
          else
            gh release create "$TAG" --title "Release $TAG" --notes "$BODY" --draft
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger publish
        run: |
          gh workflow run publish.yml -f version=${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}